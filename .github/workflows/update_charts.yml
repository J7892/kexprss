name: Update KEXP RSS Feed

on:
  schedule:
    # Runs every Friday at 9:00 AM UTC (KEXP usually updates charts weekly)
    - cron: '0 9 * * 5'
  workflow_dispatch: # Allows you to also trigger it manually with a button click

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run Extraction Script
      run: python extract_charts.py

    - name: Commit and Push RSS Feed
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "actions@github.com"
        git add kexp_top90.xml
        git diff-index --quiet HEAD || git commit -m "Automated chart update" -a
        git push
